<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Shades of Chettinad</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding-top: 20px !important; /* Override fixed header padding from styles.css */
        }
        .thank-you-container {
            text-align: center;
            padding: 20px !important;
        }
        .thank-you-container h1 {
            color: #D4AF37;
            font-size: 3em;
            margin-bottom: 20px;
        }
        .order-number {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            color: #111;
            display: inline-block;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header style="text-align: center; margin-top: 20px; margin-bottom: 0;">
        <div class="logo" style="display: flex; justify-content: center;">
            <a href="index.html" style="text-decoration: none; display: inline-block;">
                <img src="logo.png" alt="Shades of Chettinad Logo" title="Shades of Chettinad" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%;">
            </a>
        </div>
    </header>

    <main class="container thank-you-container">
        <h1>Thank You for Your Order!</h1>
        <p>Your order has been successfully placed and is awaiting confirmation.</p>
        <div class="order-number" id="order-number-display">Order #</div>
        <div style="margin-top: 40px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;" id="thank-you-actions">
            <a href="index.html" class="cta-button">Continue Shopping</a>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center;">
            <p>&copy; 2026 Shades of Chettinad. All rights reserved.</p>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            if (orderId) {
                const orderDisplay = document.getElementById('order-number-display');
                orderDisplay.textContent = `Order #${orderId}`;
                
                const actionsContainer = document.getElementById('thank-you-actions');
                const viewBtn = document.createElement('a');
                viewBtn.href = `dashboard.html?tab=history&orderId=${orderId}`;
                viewBtn.className = 'cta-button';
                viewBtn.style.background = 'transparent';
                viewBtn.style.color = 'var(--color-muted-gold)';
                viewBtn.style.border = '1px solid var(--color-muted-gold)';
                viewBtn.textContent = 'View Order Details';
                actionsContainer.insertBefore(viewBtn, actionsContainer.firstChild);
            }
        });
    </script>
</body>
</html>
